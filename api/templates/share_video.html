<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shared Video - EZREC</title>
    <style>
        body { 
            font-family: Arial, sans-serif; 
            background: #f7f7f7; 
            margin: 0; 
            padding: 0; 
            text-align: center; 
        }
        .container { 
            margin: 40px auto; 
            background: #fff; 
            border-radius: 8px; 
            box-shadow: 0 2px 8px #0001; 
            max-width: 600px; 
            padding: 32px; 
        }
        h2 { color: #2a2a2a; }
        video { 
            width: 100%; 
            max-width: 540px; 
            border-radius: 8px; 
            margin-bottom: 16px; 
        }
        .download-btn { 
            display: inline-block; 
            margin-top: 16px; 
            padding: 12px 24px; 
            background: #0077ff; 
            color: #fff; 
            border: none; 
            border-radius: 4px; 
            text-decoration: none; 
            font-size: 1.1em; 
            transition: background 0.2s; 
            cursor: pointer;
        }
        .download-btn:hover { background: #0056cc; }
        .error { 
            color: #dc3545; 
            background: #f8d7da; 
            padding: 16px; 
            border-radius: 4px; 
            margin: 16px 0; 
        }
        .analytics {
            margin-top: 20px;
            padding: 16px;
            background: #f8f9fa;
            border-radius: 4px;
            font-size: 0.9em;
            color: #666;
        }
        .share-info {
            margin-top: 16px;
            padding: 12px;
            background: #e3f2fd;
            border-radius: 4px;
            font-size: 0.9em;
        }
        .loading {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid #f3f3f3;
            border-top: 3px solid #0077ff;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="container">
        <h2>Shared Video</h2>
        
        {% if error %}
            <div class="error">
                {{ error }}
            </div>
        {% else %}
            {% if video_url %}
                <video controls>
                    <source src="{{ video_url }}" type="video/mp4">
                    Your browser does not support the video tag.
                </video>
                
                <button class="download-btn" onclick="downloadVideo()">
                    Download Video
                </button>
                <div id="expiry-info" class="share-info"></div>
                
                <div class="analytics">
                    <p>📊 This link has been accessed {{ access_count }} times</p>
                    {% if last_accessed %}
                    <p>🕒 Last accessed: {{ last_accessed }}</p>
                    {% endif %}
                </div>
            {% else %}
                <div class="error">
                    Video not available.
                </div>
            {% endif %}
        {% endif %}
    </div>

    <script>
        // Expiry timer logic
        (function() {
            const expiresAt = "{{ expires_at }}";
            if (expiresAt) {
                const expiryDiv = document.getElementById('expiry-info');
                const expiryDate = new Date(expiresAt);
                function updateCountdown() {
                    const now = new Date();
                    const diff = expiryDate - now;
                    if (diff <= 0) {
                        expiryDiv.innerHTML = '<span style="color:#dc3545">This link has expired.</span>';
                        return;
                    }
                    const days = Math.floor(diff / (1000 * 60 * 60 * 24));
                    const hours = Math.floor((diff / (1000 * 60 * 60)) % 24);
                    const minutes = Math.floor((diff / (1000 * 60)) % 60);
                    const seconds = Math.floor((diff / 1000) % 60);
                    expiryDiv.innerHTML = `<strong>Expires:</strong> ${expiryDate.toLocaleString()}<br><strong>Time left:</strong> ${days}d ${hours}h ${minutes}m ${seconds}s`;
                }
                updateCountdown();
                setInterval(updateCountdown, 1000);
            }
        })();

        function downloadVideo() {
            const downloadBtn = document.querySelector('.download-btn');
            const originalText = downloadBtn.textContent;
            // Show loading state
            downloadBtn.innerHTML = '<span class="loading"></span> Downloading...';
            downloadBtn.disabled = true;
            // Track download
            fetch('/share/{{ token }}/download', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                }
            }).then(response => {
                // Always try to get a fresh download URL
                return fetch(`/share/{{ token }}/download_url`);
            }).then(res => res.json())
            .then(data => {
                if (data.url) {
                    // Trigger download
                    const link = document.createElement('a');
                    link.href = data.url;
                    link.download = 'shared_video.mp4';
                    document.body.appendChild(link);
                    link.click();
                    document.body.removeChild(link);
                    // Update button
                    downloadBtn.textContent = '✓ Downloaded!';
                    setTimeout(() => {
                        downloadBtn.textContent = originalText;
                        downloadBtn.disabled = false;
                    }, 2000);
                } else {
                    throw new Error('Failed to get download URL');
                }
            }).catch(error => {
                console.error('Error downloading video:', error);
                downloadBtn.textContent = originalText;
                downloadBtn.disabled = false;
            });
        }
    </script>
</body>
</html>
