# EZREC Backend Log Rotation Configuration
# This file should be placed in /etc/logrotate.d/ezrec-backend

/opt/ezrec-backend/logs/*.log {
    daily
    rotate 7
    compress
    delaycompress
    missingok
    notifempty
    create 644 ezrec ezrec
    postrotate
        systemctl reload rsyslog > /dev/null 2>&1 || true
    endscript
}

# Specific log files with different rotation policies
/opt/ezrec-backend/logs/dual_recorder.log {
    daily
    rotate 14
    compress
    delaycompress
    missingok
    notifempty
    create 644 ezrec ezrec
}

/opt/ezrec-backend/logs/video_worker.log {
    daily
    rotate 14
    compress
    delaycompress
    missingok
    notifempty
    create 644 ezrec ezrec
}

/opt/ezrec-backend/logs/system_status.log {
    weekly
    rotate 4
    compress
    delaycompress
    missingok
    notifempty
    create 644 ezrec ezrec
} 