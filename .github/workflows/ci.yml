name: EZREC Backend CI/CD

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install flake8 black pytest pytest-cov requests boto3 python-dotenv psutil pytz supabase
    
    - name: Lint with flake8
      run: |
        # stop the build if there are Python syntax errors or undefined names
        flake8 backend/ --count --select=E9,F63,F7,F82 --show-source --statistics
        # exit-zero treats all errors as warnings
        flake8 backend/ --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics
    
    - name: Format check with black
      run: |
        black --check --diff backend/
    
    - name: Run tests
      run: |
        cd backend
        python -m pytest test_cleanup.py test_system_status.py -v --cov=. --cov-report=xml
    
    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v3
      with:
        file: ./backend/coverage.xml
        flags: unittests
        name: codecov-umbrella

  security:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Run Bandit security checks
      run: |
        pip install bandit
        bandit -r backend/ -f json -o bandit-report.json || true
    
    - name: Upload Bandit results
      uses: actions/upload-artifact@v3
      with:
        name: bandit-report
        path: bandit-report.json

  deployment-test:
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Test deployment script syntax
      run: |
        # Install shellcheck
        sudo apt-get update
        sudo apt-get install -y shellcheck
        
        # Check deployment script
        shellcheck deployment.sh
        
        # Test that the script can be parsed
        bash -n deployment.sh
    
    - name: Validate systemd service files
      run: |
        # Check systemd service files syntax
        for service_file in systemd/*.service; do
          echo "Validating $service_file"
          systemd-analyze verify "$service_file" || echo "Warning: $service_file validation failed"
        done
    
    - name: Test logrotate configuration
      run: |
        # Test logrotate config syntax
        if [ -f logrotate.conf ]; then
          logrotate --debug logrotate.conf || echo "Warning: logrotate config validation failed"
        fi 